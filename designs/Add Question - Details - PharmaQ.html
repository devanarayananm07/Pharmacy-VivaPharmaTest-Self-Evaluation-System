<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PharmaQ - Question Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
        
        body {
            font-family: 'Geist', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom scrollbar for medical minimalism */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a78bfa;
        }

        .form-input-focus:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.2);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#fafafa",
                        "primary": "#a78bfa",
                        "inverse-primary": "#5b21b6",
                        "on-surface": "#fafafa",
                        "surface-container-high": "#18181b",
                        "outline": "#52525b",
                        "surface-container": "#121215",
                        "secondary-fixed-dim": "#71717a",
                        "inverse-on-surface": "#09090b",
                        "surface-dim": "#0c0c0f",
                        "secondary-fixed": "#a1a1aa",
                        "surface": "#0c0c0f",
                        "primary-fixed-dim": "#c4b5fd",
                        "tertiary-fixed": "#bbf7d0",
                        "outline-variant": "#27272a",
                        "tertiary-fixed-dim": "#6ee7b7",
                        "on-secondary-container": "#a1a1aa",
                        "on-primary-fixed-variant": "#5b21b6",
                        "surface-variant": "#18181b",
                        "on-secondary": "#09090b",
                        "on-error-container": "#fca5a5",
                        "primary-fixed": "#ede9fe",
                        "on-primary-fixed": "#2e1065",
                        "error": "#ef4444",
                        "secondary-container": "#27272a",
                        "background": "#09090b",
                        "surface-container-highest": "#1e1e22",
                        "on-tertiary-fixed-variant": "#047857",
                        "surface-bright": "#18181b",
                        "on-secondary-fixed-variant": "#3f3f46",
                        "on-primary-container": "#ede9fe",
                        "surface-tint": "#a78bfa",
                        "secondary": "#71717a",
                        "on-tertiary": "#001a12",
                        "surface-container-lowest": "#09090b",
                        "on-tertiary-fixed": "#003318",
                        "on-tertiary-container": "#bbf7d0",
                        "surface-container-low": "#0f0f12",
                        "error-container": "#3b1111",
                        "on-primary": "#0a0012",
                        "tertiary-container": "#065f46",
                        "tertiary": "#34d399",
                        "on-secondary-fixed": "#18181b",
                        "inverse-surface": "#fafafa",
                        "primary-container": "#7c3aed",
                        "on-surface-variant": "#a1a1aa",
                        "on-error": "#1a0000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Geist"],
                        "display": ["Geist"],
                        "body": ["Geist"],
                        "label": ["Geist"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background border-b border-outline-variant z-50 flex items-center justify-between px-4 h-16 max-w-none">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="clinical_notes">clinical_notes</span>
<h1 class="text-xl font-bold tracking-tighter text-primary">PharmaQ</h1>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-variant transition-colors rounded-full active:opacity-80">
<span class="material-symbols-outlined text-secondary" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-4 pt-8">
<!-- Header Section -->
<div class="mb-10">
<h2 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Add New Question</h2>
<p class="text-secondary text-sm">Drafting a clinical scenario for the drug repository. Ensure all pharmacological data is accurate.</p>
</div>
<form class="space-y-12">
<!-- Section 1: Core Identification -->
<section>
<div class="flex items-center gap-2 mb-6">
<div class="w-1 h-6 bg-primary rounded-full"></div>
<h3 class="text-sm font-semibold uppercase tracking-widest text-secondary">Core Identification</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2 col-span-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Generic Name</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus placeholder:text-secondary-fixed-dim transition-all" placeholder="e.g. Amoxicillin Trihydrate" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Brand Name</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus placeholder:text-secondary-fixed-dim transition-all" placeholder="e.g. Amoxil" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Manufacturer</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus placeholder:text-secondary-fixed-dim transition-all" placeholder="e.g. GlaxoSmithKline" type="text"/>
</div>
</div>
</section>
<!-- Section 2: Clinical Data -->
<section>
<div class="flex items-center gap-2 mb-6">
<div class="w-1 h-6 bg-tertiary rounded-full"></div>
<h3 class="text-sm font-semibold uppercase tracking-widest text-secondary">Clinical Data</h3>
</div>
<div class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Indication</label>
<textarea class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus placeholder:text-secondary-fixed-dim transition-all resize-none" placeholder="Primary therapeutic uses and clinical conditions..." rows="3"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Schedule</label>
<select class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus appearance-none transition-all">
<option>Schedule I (No medical use)</option>
<option>Schedule II (High potential for abuse)</option>
<option>Schedule III (Moderate potential)</option>
<option>Schedule IV (Low potential)</option>
<option>Unscheduled / OTC</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider">Strength/Dosage</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg p-3 text-on-surface form-input-focus placeholder:text-secondary-fixed-dim transition-all" placeholder="e.g. 500mg q8h" type="text"/>
</div>
</div>
</div>
</section>
<!-- Section 3: Question Logic -->
<section>
<div class="flex items-center gap-2 mb-6">
<div class="w-1 h-6 bg-primary-fixed-dim rounded-full"></div>
<h3 class="text-sm font-semibold uppercase tracking-widest text-secondary">Question Logic</h3>
</div>
<div class="space-y-4">
<label class="text-xs font-medium text-secondary-fixed uppercase tracking-wider block mb-2">Category</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="antibiotics"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Antibiotics
                            </div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="narcotics"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Narcotics
                            </div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="cardio"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Cardiovascular
                            </div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="neuro"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Neurology
                            </div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="endocrine"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Endocrine
                            </div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="other"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface-container text-center text-sm transition-all group-hover:bg-surface-variant peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary">
                                Other
                            </div>
</label>
</div>
</div>
</section>
<!-- Navigation Actions -->
<div class="flex flex-col sm:flex-row gap-4 pt-6">
<button class="flex-1 bg-primary text-on-primary font-bold py-4 rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                    Continue to Difficulty
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="flex-1 border border-outline-variant text-on-surface font-semibold py-4 rounded-xl hover:bg-surface-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-lg" data-icon="drafts">drafts</span>
                    Save as Draft
                </button>
</div>
</form>
<!-- Decorative Contextual Image -->
<div class="mt-16 mb-8 rounded-2xl overflow-hidden border border-outline-variant h-48 relative">
<img class="w-full h-full object-cover grayscale-[0.5] opacity-60" data-alt="A high-contrast macro photograph of sterile medical laboratory equipment and glass vials on a dark obsidian surface. The lighting is precise and professional, with soft violet highlights reflecting off the glass. The atmosphere is clinical, orderly, and technologically advanced, mirroring the pharmaceutical precision of the app's dark mode design language. Every surface is clean, suggesting a premium healthcare environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB45qR0Rfb73y0DwdPloEJr18kmqFHNuJ9ZJNdB39Pv2_9DH3XcBTW-cm_Bl2dSe4U4gzeTB7ONsrYfCEW1CIIpsTflAVSPm0ugFOZ_hZmnAxjQDppD_aXZtPm6TkTm1EV4_5PiOJFngdss4E39nygL3h8MAeoapCH1cW2Xm-9kRCHQolTRxZxjOZ3iuUuHhMfA5yyHT1oQxVUwAXnX6VMI3R3ZgkZgcemZND-b6g82cfnow7Wu6jmqaVTGM2SnCffePsrl8L7oZo0"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-4 left-4">
<span class="text-[10px] uppercase tracking-widest text-secondary font-bold">Mentor Module v2.4</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-2 pb-safe bg-surface border-t border-outline-variant z-50">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label text-xs uppercase tracking-wider mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-primary bg-primary-container/10 rounded-xl px-3 py-1 hover:text-primary transition-colors active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label text-xs uppercase tracking-wider mt-1">Study</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label text-xs uppercase tracking-wider mt-1">Score</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-xs uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
<script>
        // Micro-interactions for form feedback
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                // Subtle ambient glow or interaction logic can go here
            });
        });

        // Mock interaction for category selection
        const categories = document.querySelectorAll('input[name="category"]');
        categories.forEach(cat => {
            cat.addEventListener('change', (e) => {
                console.log(`Selected category: ${e.target.value}`);
            });
        });
    </script>
</body></html>
