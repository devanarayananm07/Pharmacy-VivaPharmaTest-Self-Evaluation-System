<script>
        // Simple micro-interaction for radio buttons since they're custom
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const parent = e.target.closest('div');
                // The visual peer-checked handles most of it via Tailwind peer classes
            });
        });

        // Dynamic count animation on load
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        const countEl = document.querySelector('h2');
        animateValue(countEl, 0, 1240, 1500);
    </script>
