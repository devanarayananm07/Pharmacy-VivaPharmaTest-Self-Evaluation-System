<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>

<!-- Header Branding Section -->

<div class="w-16 h-16 rounded-xl bg-surface-container flex items-center justify-center border border-outline-variant shadow-2xl mb-6 group transition-all duration-300 hover:border-primary/50">

</div>

<p class="text-on-surface-variant font-body text-sm mt-2">Clinical Enterprise Portal</p>
</div>
<!-- Login Card -->
<div class="glass-card p-8 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Subtle internal light line -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-outline to-transparent opacity-50"></div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Employee ID Input -->
<div class="space-y-2">
<label class="block text-xs font-label font-medium uppercase tracking-widest text-on-surface-variant" for="employee-id">Employee ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-lg" data-icon="badge">badge</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="employee-id" placeholder="Enter your system ID" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-label font-medium uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3.5 px-4 bg-primary text-on-primary font-headline font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Authorize Access
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="pt-4 flex flex-col items-center gap-4">
<a class="text-sm font-body text-primary hover:text-primary-fixed-dim transition-colors duration-200 flex items-center gap-1" href="#">
                        Forgot Password?
                    </a>
<div class="w-full h-[1px] bg-outline-variant"></div>
<p class="text-xs text-on-surface-variant text-center leading-relaxed">
                        Authorized medical personnel only. All access is logged and monitored per HIPAA compliance protocols.
                    </p>
</div>

<!-- Decorative UI Element (Bento-style detail) -->

<div>

</div>

<span class="text-[10px] font-label font-bold tracking-widest text-on-surface uppercase">System Live: Research Unit</span>

<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Subtle mouse parallax effect for background
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                document.querySelector('.mesh-gradient').style.backgroundPosition = `${moveX}px ${moveY}px`;
            });
        });
    </script>
